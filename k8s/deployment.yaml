apiVersion: apps/v1
kind: Deployment
metadata:
  name: triton-server
  namespace: sam-service-triton
  labels:
    app: triton-server
    component: sam2-inference
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: triton-server
  template:
    metadata:
      labels:
        app: triton-server
        component: sam2-inference
    spec:
      containers:
      - name: triton
        image: nvcr.io/nvidia/tritonserver:25.01-py3
        command:
          - tritonserver
        args:
          - --model-repository=/models
          - --log-verbose=1
          - --grpc-use-ssl=false 
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        - containerPort: 8001
          name: grpc
          protocol: TCP
        - containerPort: 8002
          name: metrics
          protocol: TCP
        volumeMounts:
        - name: model-repository
          mountPath: /models
        - name: dshm
          mountPath: /dev/shm
        env:
        - name: CUDA_VISIBLE_DEVICES
          value: "0,1"
        resources:
          requests:
            cpu: "4"
            memory: 16Gi
            nvidia.com/gpu: 2
          limits:
            cpu: "8"
            memory: 24Gi
            nvidia.com/gpu: 2
        livenessProbe:
          httpGet:
            path: /v2/health/live
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /v2/health/ready
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /v2/health/live
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 60
      volumes:
      - name: model-repository
        persistentVolumeClaim:
          claimName: triton-models-pvc
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 2Gi
      # Required for GPU nodes
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
