apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: sam-service-triton-cert 
  namespace: sam-service-triton 
spec:
  secretName: sam-service-triton-tls
  renewBefore: 720h # 30 days
  issuerRef:
    name: sectigo-prod
    kind: ClusterIssuer
  dnsNames:
  - sam-service-triton.int.janelia.org
